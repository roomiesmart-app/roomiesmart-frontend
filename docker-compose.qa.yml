version: '3.8'

services:
  frontend:
    container_name: roomiesmart_frontend_qa
    image: paulchapi/roomiesmart-frontend:qa
    ports:
      - "80:80"
    restart: always

  # OJO: el servicio DEBE llamarse "api" — nginx.conf hace proxy_pass a http://api:3000
  api:
    container_name: roomiesmart_api_qa
    image: paulchapi/roomiesmart-backend:qa
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: always
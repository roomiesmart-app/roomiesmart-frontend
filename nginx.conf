server {
    listen 80;
    server_name _;

    # Ruta para servir el Frontend de React
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy Inverso: Conecta el Frontend con el contenedor Backend (Node.js)
    location /api/ {
        # IMPORTANTE: Usamos el puerto interno 3000 de Docker, y quitamos el '/' final
        # para que Nginx respete la ruta completa (ej: /api/v1/auth)
        proxy_pass http://api-dev:3000; 
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
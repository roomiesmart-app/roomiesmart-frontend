server {
    listen 80;
    server_name _;

    # Ruta para servir el Frontend de React
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy Inverso: Conecta el Frontend con el contenedor Backend
    location /api/ {
        # AHORA APUNTA A 'api' (Nombre genérico)
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    # WebSockets (Socket.io) hacia el MISMO backend api:3000.
    # Los headers Upgrade/Connection son imprescindibles para el
    # handshake WS; sin ellos Socket.io degrada a long-polling.
    # Ver docs/DEVOPS-WEBSOCKETS.md
    location /socket.io/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        
        # Aumentamos a 1 hora (3600s) en ambas direcciones
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
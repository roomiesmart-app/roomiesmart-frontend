name: Build and Deploy Frontend

on:
  push:
    branches: [ "dev", "main" ] # QA removido para que no sea automático
  workflow_dispatch: # Gatillo para desplegar a QA manualmente

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine environment tag and API URL
        id: environment
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "TAG=prod" >> $GITHUB_ENV
            echo "API_URL=http://roomiesmartprod.programacionwebuce.net" >> $GITHUB_ENV 
          elif [ "${{ github.ref_name }}" == "qa" ]; then
            echo "TAG=qa" >> $GITHUB_ENV
            # ✅ Solo el dominio exacto, sin el /api al final
            echo "API_URL=http://roomiesmartqa.programacionwebuce.net" >> $GITHUB_ENV
          else
            echo "TAG=dev" >> $GITHUB_ENV
            echo "API_URL=http://${{ secrets.AWS_HOST }}" >> $GITHUB_ENV
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: paulchapi/roomiesmart-frontend:${{ env.TAG }}
          build-args: |
            VITE_API_BASE_URL=${{ env.API_URL }}

      # =========================================================
      # DESPLIEGUE A DESARROLLO
      # =========================================================
      - name: Deploy Frontend to Dev Environment
        if: github.ref_name == 'dev'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ubuntu
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            cd ~/roomiesmart-backend
            docker pull paulchapi/roomiesmart-frontend:dev
            docker compose -f docker-compose.dev.yml up -d --remove-orphans frontend

      # =========================================================
      # DESPLIEGUE A PRODUCCIÓN
      # =========================================================
      - name: Deploy Frontend to Production Environment
        if: github.ref_name == 'main'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST_PROD }}
          username: ubuntu
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            cd ~/roomiesmart-production
            docker pull paulchapi/roomiesmart-frontend:prod
            docker compose -f docker-compose.prod.yml up -d --remove-orphans frontend

      # =========================================================
      # DESPLIEGUE A QA
      # =========================================================
      - name: Deploy Frontend to QA Environment
        if: github.ref_name == 'qa'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST_QA }}
          username: ubuntu
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            cd ~/roomiesmart-qa
            docker pull paulchapi/roomiesmart-frontend:qa
            docker compose -f docker-compose.qa.yml up -d --remove-orphans frontend
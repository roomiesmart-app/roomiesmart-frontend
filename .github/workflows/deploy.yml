name: Build and Deploy Frontend (QA)

on:
  push:
    branches: [ "qa" ] # Solo escucha a esta rama

jobs:
  build-and-deploy-qa:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push QA Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: paulchapi/roomiesmart-frontend:qa
          # Inyectamos la IP del servidor de QA directamente en la compilación
          build-args: |
            VITE_API_BASE_URL=http://${{ secrets.AWS_HOST_QA }}:3000

      - name: Deploy Frontend to QA Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST_QA }} # Apunta al secreto de tu Servidor 2
          username: ubuntu
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            cd ~/roomiesmart-qa
            docker pull paulchapi/roomiesmart-frontend:qa
            # Levantamos usando el docker-compose nativo de la máquina
            docker compose up -d frontend
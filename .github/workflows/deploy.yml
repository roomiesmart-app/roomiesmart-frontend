name: Build and Deploy Frontend

on:
  push:
    branches: [ "dev", "main", "qa" ] # Añadida la rama qa

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine environment tag and API URL
        id: environment
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "TAG=prod" >> $GITHUB_ENV
            echo "API_URL=http://52.7.189.106:8080" >> $GITHUB_ENV # Mantiene tu IP original
          elif [ "${{ github.ref_name }}" == "qa" ]; then
            echo "TAG=qa" >> $GITHUB_ENV
            echo "API_URL=http://${{ secrets.AWS_HOST_QA }}" >> $GITHUB_ENV # Nueva IP solo para QA
          else
            echo "TAG=dev" >> $GITHUB_ENV
            echo "API_URL=http://52.7.189.106:8080" >> $GITHUB_ENV # Mantiene tu IP original
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: paulchapi/roomiesmart-frontend:${{ env.TAG }}
          build-args: |
            VITE_API_BASE_URL=${{ env.API_URL }}

      # =========================================================
      # DESPLIEGUE A DESARROLLO (Intacto - No se modificó nada)
      # =========================================================
      - name: Deploy Frontend to Dev Environment
        if: github.ref_name == 'dev'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ubuntu
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            cd ~/roomiesmart-backend
            docker pull paulchapi/roomiesmart-frontend:dev
            docker compose -f docker-compose.dev.yml up -d frontend

      # =========================================================
      # DESPLIEGUE A PRODUCCIÓN (Intacto - No se modificó nada)
      # =========================================================
      - name: Deploy Frontend to Production Environment
        if: github.ref_name == 'main'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST_PROD }} # CORREGIDO: Apunta al servidor de PROD
          username: ubuntu
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            cd ~/roomiesmart-production
            docker pull paulchapi/roomiesmart-frontend:prod
            docker compose -f docker-compose.prod.yml up -d frontend
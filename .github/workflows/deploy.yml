name: CI/CD Frontend Pipeline (Release & Deploy)

on:
  push:
    branches: [ "dev", "main", "qa" ]
  pull_request: # 🟢 Dry runs for releases only on PRs to main
    branches: [ "main" ]
  workflow_dispatch: # Manual trigger

jobs:
  # =========================================================
  # STAGE 1: SEMANTIC RELEASE (Only affects the main branch)
  # =========================================================
  release:
    name: Build and Release Frontend
    runs-on: ubuntu-latest
    # Only runs on main (push) or dry runs (pull_request)
    if: github.ref_name == 'main' || github.event_name == 'pull_request'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # 🛡️ THE LOCK: Compiles Vite and validates TypeScript before releasing
      - name: Build React App
        run: npm run build

      # 🟢 DRY RUN: Only if it's a Pull Request
      - name: Run Semantic Release (Dry Run)
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release --dry-run

      # 🔴 PRODUCTION: Only if it's a direct push/merge to main
      - name: Run Semantic Release (Production)
        if: github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

  # =========================================================
  # STAGE 2: BUILD & DEPLOY (Current Infrastructure)
  # =========================================================
  build-and-push:
    name: Build and Deploy Docker
    runs-on: ubuntu-latest
    needs: [release]
    # 🛡️ SRE LOCK: Runs as long as Release didn't fail, and skips PRs
    if: |
      always() && 
      (needs.release.result == 'success' || needs.release.result == 'skipped') &&
      github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine environment tag and API URL
        id: environment
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "TAG=prod" >> $GITHUB_ENV
            echo "API_URL=https://prod.roomiesmart.lat" >> $GITHUB_ENV
          elif [ "${{ github.ref_name }}" == "qa" ]; then
            echo "TAG=qa" >> $GITHUB_ENV
            echo "API_URL=https://qa.roomiesmart.lat" >> $GITHUB_ENV
          else
            echo "TAG=dev" >> $GITHUB_ENV
            echo "API_URL=https://roomiesmart.lat" >> $GITHUB_ENV
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: paulchapi/roomiesmart-frontend:${{ env.TAG }}
          build-args: |
            VITE_API_BASE_URL=${{ env.API_URL }}
            VITE_KINDE_CLIENT_ID=${{ secrets.VITE_KINDE_CLIENT_ID }}
            VITE_KINDE_ISSUER_URL=https://roomiesmart.kinde.com
            VITE_KINDE_SITE_URL=${{ env.API_URL }}
            VITE_KINDE_POST_LOGIN_REDIRECT_URL=${{ env.API_URL }}/dispatcher
            VITE_KINDE_POST_LOGOUT_REDIRECT_URL=${{ env.API_URL }}

      # =========================================================
      # DEPLOY TO DEVELOPMENT
      # =========================================================
      - name: Deploy Frontend to Dev Environment
        if: github.ref_name == 'dev'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ubuntu
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            cd ~/roomiesmart-backend
            docker pull paulchapi/roomiesmart-frontend:dev
            docker compose -f docker-compose.dev.yml up -d --remove-orphans frontend

      # =========================================================
      # DEPLOY TO PRODUCTION
      # =========================================================
      - name: Deploy Frontend to Production Environment
        if: github.ref_name == 'main'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST_PROD }}
          username: ubuntu
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            cd ~/roomiesmart-production
            docker pull paulchapi/roomiesmart-frontend:prod
            docker compose -f docker-compose.prod.yml up -d --remove-orphans frontend

      # =========================================================
      # DEPLOY TO QA
      # =========================================================
      - name: Deploy Frontend to QA Environment
        if: github.ref_name == 'qa' || github.event_name == 'workflow_dispatch'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST_QA }}
          username: ubuntu
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            cd ~/roomiesmart-qa
            docker pull paulchapi/roomiesmart-frontend:qa
            docker compose -f docker-compose.qa.yml up -d --remove-orphans frontend